name: security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        # Pinned version. Bump deliberately after reviewing the release notes.
        run: >
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1 git /repo
          --redact --no-banner --exit-code 1
